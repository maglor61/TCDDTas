<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>KAM PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🚆 KAM PRO</h2>

    <button onclick="openTab('home')">🏠 Ana Sayfa</button>
    <button onclick="openTab('stations')">🚉 İstasyonlar</button>
    <button onclick="openTab('lines')">🚄 Hatlar</button>
    <button onclick="openTab('abonman')">💳 Abonman</button>
    <button onclick="openTab('calculator')">🎂 Hesaplama</button>
    <button onclick="openTab('info')">ℹ Bilgi</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- HOME -->
    <div id="home" class="page active">
      <h1>Dashboard</h1>

      <div class="grid">
        <div class="card">🚉 120 İstasyon</div>
        <div class="card">🚄 6 Hat</div>
        <div class="card">📊 Sistem Aktif</div>
        <div class="card">⚡ Gerçek Zamanlı</div>
      </div>
    </div>

    <!-- STATIONS -->
    <div id="stations" class="page">
      <h2>İstasyonlar</h2>
      <input oninput="renderStations()" id="search" placeholder="İstasyon ara...">
      <div id="stationList"></div>
    </div>

    <!-- LINES -->
    <div id="lines" class="page">
      <h2>Hatlar</h2>
      <div id="lineList"></div>
    </div>

    <!-- ABONMAN -->
    <div id="abonman" class="page">
      <h2>Abonman Sistemi</h2>

      <input id="from" placeholder="Nereden">
      <input id="to" placeholder="Nereye">

      <button onclick="calc()">Hesapla</button>

      <p id="result"></p>
    </div>

    <!-- CALCULATOR -->
    <div id="calculator" class="page">
      <h2>Yaş Hesaplama</h2>

      <input type="date" id="birth">
      <button onclick="age()">Hesapla</button>

      <p id="ageResult"></p>
    </div>

    <!-- INFO -->
    <div id="info" class="page">
      <h2>Bilgi Paneli</h2>
      <p>Bu sistem KAM PRO demo versiyonudur.</p>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
